<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – EVENZA</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body{
      margin:0;
      padding:0;
      font-family:Poppins, sans-serif;
      background: linear-gradient(135deg, #001f3f, #005eab);
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      color:#fff;
    }
    .login-box{
      width:350px;
      padding:30px;
      border-radius:14px;
      backdrop-filter: blur(12px);
      background: rgba(255,255,255,0.15);
      border:1px solid rgba(255,255,255,0.3);
      box-shadow:0 18px 38px rgba(0,0,0,0.35);
    }
    .login-box h2{
      text-align:center;
      margin-bottom:20px;
      color:#fff;
    }
    .login-box input{
      width:100%;
      padding:10px;
      margin:10px 0;
      border:none;
      border-radius:10px;
      background:rgba(255,255,255,0.8);
    }
    .login-box button{
      width:100%;
      padding:10px;
      border:none;
      border-radius:10px;
      margin-top:10px;
      background:linear-gradient(135deg, #00b4d8, #0077b6);
      color:#fff;
      font-weight:600;
      cursor:pointer;
    }
    .note{
      text-align:center;
      margin-top:10px;
      font-size:13px;
      opacity:0.8;
    }
  </style>

</head>
<body>

  <div class="login-box">
    <h2>Admin Login</h2>
    <input type="email" id="loginEmail" placeholder="Enter Email" />
    <input type="password" id="loginPass" placeholder="Enter Password" />
    <button id="loginBtn">Login</button>
    <p class="note">Only authorized admins allowed.</p>
  </div>

  <script type="module" src="login.js"></script>
</body>
</html>
